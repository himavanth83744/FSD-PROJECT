# ═══════════════════════════════════════════════
# VELTECH UNIVERSITY — CAMPUS EVENT PORTAL
# application.properties
# ═══════════════════════════════════════════════

spring.application.name=veltech-portal

# ── Server ──
server.port=8080

# ── MySQL Database Configuration ──
spring.datasource.url=jdbc:mysql://localhost:3306/veltech_portal?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ── Jackson ──
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# ── Logging ──
logging.level.com.veltech.portal=INFO
logging.level.org.hibernate.SQL=WARN
